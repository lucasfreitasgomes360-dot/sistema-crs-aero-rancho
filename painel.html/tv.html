<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TV - CRS Aero Rancho</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            /* Imagem vinda direto da internet para facilitar */
            background: linear-gradient(rgba(1, 49, 84, 0.7), rgba(1, 49, 84, 0.7)), url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed; 
            background-size: cover;
            color: white; margin: 0; overflow: hidden; cursor: pointer; 
        }
        header { background: rgba(255,255,255,0.9); color: #013154; padding: 15px; text-align: center; border-bottom: 8px solid #f1c40f; position: relative; }
        .dr-homenagem { font-size: 14px; font-weight: bold; color: #555; }
        #relogio { position: absolute; top: 25px; right: 30px; font-size: 28px; font-weight: bold; color: #013154; }
        #area-chamada { height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .status { font-size: 30px; color: #f1c40f; letter-spacing: 5px; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        .paciente { font-size: 90px; font-weight: 900; text-transform: uppercase; text-shadow: 4px 4px 10px rgba(0,0,0,0.8); margin: 20px 0; }
        .local { font-size: 55px; background: rgba(0,0,0,0.6); padding: 10px 40px; border-radius: 50px; border: 2px solid #f1c40f; }
        footer { position: fixed; bottom: 0; width: 100%; background: rgba(231, 76, 60, 0.9); height: 80px; overflow: hidden; display: flex; align-items: center; }
        .marquee { white-space: nowrap; font-size: 35px; font-weight: bold; animation: scroll 30s linear infinite; padding-left: 100%; display: inline-block; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-200%); } }
        #aviso-audio { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; display: flex; justify-content: center; align-items: center; z-index: 1000; font-size: 30px; text-align: center; padding: 20px; }
    </style>
</head>
<body onclick="liberarAudio()">
<div id="aviso-audio"><div>⚠️ TOQUE NA TELA PARA ATIVAR O SOM E A TV</div></div>
<header>
    <h1 style="margin:0">Centro Regional de Saúde 24h - Aero Rancho</h1>
    <div class="dr-homenagem">Dr. João Pereira da Rosa</div>
    <div id="relogio">00:00</div>
</header>
<main id="area-chamada">
    <div class="status" id="label-status">SISTEMA ATIVO</div>
    <div class="paciente" id="tv-nome">AGUARDANDO...</div>
    <div class="local" id="tv-local">---</div>
</main>
<footer><div class="marquee" id="tv-avisos">Bem-vindo ao CRS Aero Rancho. Aguardando comunicados da gerência...</div></footer>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBRe3t7YCWUkggxBjE6d4OS4on4MrJ5J1A",
      authDomain: "sistema-crs-aero-rancho.firebaseapp.com",
      databaseURL: "https://sistema-crs-aero-rancho-default-rtdb.firebaseio.com",
      projectId: "sistema-crs-aero-rancho",
      storageBucket: "sistema-crs-aero-rancho.firebasestorage.app",
      messagingSenderId: "543461454068",
      appId: "1:543461454068:web:c06dbdab52c065e6962ea1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let fila = [], ocupado = false, audioLiberado = false;

    function liberarAudio() {
        audioLiberado = true;
        document.getElementById('aviso-audio').style.display = 'none';
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
    }

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}); }, 1000);

    db.ref('chamada_atual').on('value', snap => {
        const d = snap.val();
        if (d && d.timestamp > Date.now() - 10000) {
            fila.push(d);
            if (!ocupado && audioLiberado) processarFila();
        }
    });

    db.ref('avisos').on('value', snap => { if(snap.val()) document.getElementById('tv-avisos').innerText = snap.val(); });

    function processarFila() {
        if (fila.length === 0 || !audioLiberado) { ocupado = false; return; }
        ocupado = true;
        const item = fila.shift();
        document.getElementById('tv-nome').innerText = item.nome;
        const prep = ["triagem", "sala", "coleta", "medicação", "inalação", "odontologia", "social"].some(x => item.local.toLowerCase().includes(x)) ? "à" : "ao";
        document.getElementById('tv-local').innerText = `Dirija-se ${prep} ${item.local}`;
        const msg = new SpeechSynthesisUtterance(`Atenção... ${item.genero === 'F' ? 'A paciente' : 'O paciente'} ${item.nome}... dirija-se ${prep} ${item.local}`);
        msg.lang = 'pt-BR'; msg.rate = 0.85;
        window.speechSynthesis.speak(msg);
        msg.onend = () => { setTimeout(processarFila, 5000); };
    }
</script>
</body>
</html>
