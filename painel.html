<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Chamada - CRS Aero Rancho</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .card { background: white; max-width: 500px; margin: auto; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #013154; margin-top: 0; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 1.2rem; box-sizing: border-box; }
        .grid-setores { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-setor { padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; font-size: 14px; }
        .medico { background: #007bff; } /* Azul */
        .enfermagem { background: #28a745; } /* Verde */
        .btn-setor:hover { opacity: 0.8; }
        .hist { text-align: left; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .item-hist { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dotted #ccc; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Chamar Paciente</h2>
    <input type="text" id="nome-paciente" placeholder="Nome Completo do Paciente" autocomplete="off">
    
    <p><strong>SELECIONE O LOCAL:</strong></p>
    
    <div style="color: #007bff; font-weight: bold; margin-bottom: 5px;">ÁREA MÉDICA</div>
    <div class="grid-setores">
        <button class="btn-setor medico" onclick="chamar('Consultório 01')">Consultório 01</button>
        <button class="btn-setor medico" onclick="chamar('Consultório 02')">Consultório 02</button>
        <button class="btn-setor medico" onclick="chamar('Consultório 03')">Consultório 03</button>
        <button class="btn-setor medico" onclick="chamar('Consultório 04')">Consultório 04</button>
    </div>

    <div style="color: #28a745; font-weight: bold; margin-top: 15px; margin-bottom: 5px;">ENFERMAGEM / SALAS</div>
    <div class="grid-setores">
        <button class="btn-setor enfermagem" onclick="chamar('Triagem')">Triagem</button>
        <button class="btn-setor enfermagem" onclick="chamar('Sala de Coleta')">Sala de Coleta</button>
        <button class="btn-setor enfermagem" onclick="chamar('Medicação')">Medicação</button>
        <button class="btn-setor enfermagem" onclick="chamar('Reidratação')">Reidratação</button>
    </div>

    <div class="hist">
        <strong>Últimos Chamados:</strong>
        <div id="lista-painel"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBRe3t7YCWUkggxBjE6d4OS4on4MrJ5J1A",
      authDomain: "sistema-crs-aero-rancho.firebaseapp.com",
      databaseURL: "https://sistema-crs-aero-rancho-default-rtdb.firebaseio.com",
      projectId: "sistema-crs-aero-rancho",
      storageBucket: "sistema-crs-aero-rancho.firebasestorage.app",
      messagingSenderId: "543461454068",
      appId: "1:543461454068:web:c06dbdab52c065e6962ea1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function chamar(local) {
        const nome = document.getElementById('nome-paciente').value.trim();
        if (!nome) { alert("Por favor, digite o nome do paciente!"); return; }

        const dados = {
            nome: nome,
            local: local,
            timestamp: Date.now()
        };

        db.ref('chamada_atual').set(dados);
        document.getElementById('nome-paciente').value = ""; // Limpa campo
        atualizarHistLocal(nome, local);
    }

    function atualizarHistLocal(n, l) {
        const div = document.getElementById('lista-painel');
        const item = document.createElement('div');
        item.className = 'item-hist';
        item.innerHTML = `<span>${n}</span> <b>${l}</b>`;
        div.prepend(item);
    }
</script>
</body>
</html>
