<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerência - Painel de Controle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --bg: #f1f5f9; --danger: #e11d48; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        textarea, input { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #f1f5f9; font-family: inherit; font-weight: 600; box-sizing: border-box; margin-bottom: 10px; }
        .btn-main { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; }
        .grid-alertas { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-alert { padding: 15px; border: none; border-radius: 15px; color: white; font-weight: 800; cursor: pointer; }
        .signature { font-size: 0.7rem; font-weight: 800; color: #cbd5e1; letter-spacing: 2px; text-transform: uppercase; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="unidade-nome">Gestão</h2>
        <p style="color:#64748b; font-weight:600">Controle de Letreiro</p>
        <textarea id="texto-letreiro" rows="3" placeholder="Digite a mensagem do rodapé..."></textarea>
        <button class="btn-main" onclick="atualizarLetreiro()">Atualizar Rodapé</button>
    </div>

    <div class="card">
        <p style="color:#64748b; font-weight:600">Alertas de Destaque</p>
        <div class="grid-alertas">
            <button class="btn-alert" style="background:#e11d48" onclick="enviarAviso('EMERGÊNCIA: ATENDIMENTO RESTRITO', '#e11d48')">Emergência</button>
            <button class="btn-alert" style="background:#f59e0b" onclick="enviarAviso('SISTEMA EM MANUTENÇÃO', '#f59e0b')">Manutenção</button>
            <button class="btn-alert" style="background:#3b82f6" onclick="enviarAviso('HORÁRIO DE VISITAS: 14H ÀS 16H', '#3b82f6')">Visitas</button>
            <button class="btn-alert" style="background:#10b981" onclick="enviarAviso('VACINAÇÃO ATIVA', '#10b981')">Vacinas</button>
        </div>
    </div>

    <div class="signature">Designed by Lucas Freitas Gomes</div>

<script>
    if(sessionStorage.getItem('logado') !== 'true') window.location.href = "index.html";
    
    // AQUI ESTÁ A CORREÇÃO: u_id em vez de unidade_id
    const uID = sessionStorage.getItem('u_id'); 
    const uNome = sessionStorage.getItem('u_nome');
    document.getElementById('unidade-nome').innerText = uNome;

    const firebaseConfig = { apiKey: "AIzaSyBRe3t7YCWUkggxBjE6d4OS4on4MrJ5J1A", databaseURL: "https://sistema-crs-aero-rancho-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function atualizarLetreiro() {
        const txt = document.getElementById('texto-letreiro').value;
        db.ref(uID + '/avisos').set({ texto: txt, time: Date.now() })
          .then(() => alert("Letreiro atualizado!"));
    }

    function enviarAviso(texto, cor) {
        db.ref(uID + '/aviso_destaque').set({ texto, cor, time: Date.now() })
          .then(() => alert("Alerta enviado!"));
    }
</script>
</body>
</html>
