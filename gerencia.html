<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerência CRS</title>
    <style>body{font-family:sans-serif; padding:50px; text-align:center;}</style>
</head>
<body>
    <h1>Painel de Gerência - Avisos da TV</h1>
    <textarea id="avisos" rows="5" style="width:100%; max-width:600px; font-size:18px;"></textarea><br><br>
    <button onclick="salvar()" style="padding:15px 40px; background:red; color:white; border:none; cursor:pointer; font-weight:bold;">ATUALIZAR CARROSSEL NA TV</button>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBRe3t7YCWUkggxBjE6d4OS4on4MrJ5J1A",
          authDomain: "sistema-crs-aero-rancho.firebaseapp.com",
          databaseURL: "https://sistema-crs-aero-rancho-default-rtdb.firebaseio.com",
          projectId: "sistema-crs-aero-rancho",
          storageBucket: "sistema-crs-aero-rancho.firebasestorage.app",
          messagingSenderId: "543461454068",
          appId: "1:543461454068:web:c06dbdab52c065e6962ea1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function salvar() {
            const txt = document.getElementById('avisos').value;
            db.ref('avisos').set(txt);
            alert("Avisos atualizados!");
        }
        db.ref('avisos').once('value', snap => { document.getElementById('avisos').value = snap.val(); });
    </script>
</body>
</html>
