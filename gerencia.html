<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerência - Controle SESAU</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #6366f1; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--primary); }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full { grid-column: span 2; }
        label { font-size: 0.8rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #f1f5f9; font-family: inherit; font-weight: 600; box-sizing: border-box; }
        .unidades-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .u-item { background: #f8fafc; padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 10px; cursor: pointer; border: 2px solid transparent; }
        .u-item:has(input:checked) { border-color: var(--accent); background: #eff6ff; }
        .btn-save { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 20px; font-weight: 800; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        .btn-save:hover { background: var(--accent); transform: translateY(-2px); }
    </style>
</head>
<body>
<div class="container">
    <div style="margin-bottom: 30px;">
        <h1 style="margin:0; font-weight:800;">Gestão de Profissionais</h1>
        <p style="color:#64748b; margin:5px 0;">Cadastre e gerencie acessos às unidades</p>
    </div>

    <div class="card">
        <div class="form-grid">
            <div><label>Login (Usuário)</label><input type="text" id="reg-user" placeholder="ex: joao.med"></div>
            <div><label>Senha Inicial</label><input type="text" id="reg-pass" placeholder="Senha provisória"></div>
            <div class="full"><label>Nome Completo</label><input type="text" id="reg-nome" placeholder="Nome do profissional"></div>
            <div class="full"><label>Cargo</label>
                <select id="reg-cargo">
                    <option value="Médico">Médico</option><option value="Médica">Médica</option>
                    <option value="Enfermeiro">Enfermeiro</option><option value="Enfermeira">Enfermeira</option>
                </select>
            </div>
        </div>
        
        <label style="margin-top: 25px;">Unidades de Atuação</label>
        <div class="unidades-grid">
            <label class="u-item"><input type="checkbox" value="aero" data-n="CRS Aero Rancho"> Aero Rancho</label>
            <label class="u-item"><input type="checkbox" value="tira" data-n="CRS Tiradentes"> Tiradentes</label>
            <label class="u-item"><input type="checkbox" value="nb" data-n="UPA Nova Bahia"> Nova Bahia</label>
            <label class="u-item"><input type="checkbox" value="uni" data-n="UPA Universitário"> Universitário</label>
        </div>

        <button class="btn-save" onclick="salvar()">CADASTRAR E SOLICITAR TROCA DE SENHA</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBRe3t7YCWUkggxBjE6d4OS4on4MrJ5J1A", databaseURL: "https://sistema-crs-aero-rancho-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function salvar() {
        const user = document.getElementById('reg-user').value.toLowerCase().trim();
        const nome = document.getElementById('reg-nome').value.trim();
        const pass = document.getElementById('reg-pass').value.trim();
        const cargo = document.getElementById('reg-cargo').value;
        const boxes = document.querySelectorAll('.unidades-grid input:checked');
        const unidades = Array.from(boxes).map(cb => ({ id: cb.value, n: cb.getAttribute('data-n') }));

        if(!user || !nome || !pass || unidades.length === 0) return alert("Preencha todos os campos!");

        db.ref('profissionais/' + user).set({
            nome, pass, cargo, multi: true, unidades, trocarSenha: true
        }).then(() => { alert("Profissional cadastrado com sucesso!"); location.reload(); });
    }
</script>
</body>
</html>
