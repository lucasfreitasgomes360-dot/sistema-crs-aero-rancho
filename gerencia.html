<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerência CRS</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; text-align: center; }
        textarea { width: 90%; height: 100px; padding: 15px; border-radius: 10px; font-size: 1.2rem; }
        button { padding: 15px 30px; margin: 10px; cursor: pointer; font-weight: bold; border-radius: 10px; border: none; }
        .btn-enviar { background: #28a745; color: white; width: 90%; }
        .btn-preset { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <h1>CONTROLE DE AVISOS - TV</h1>
    <textarea id="texto-aviso" placeholder="Digite o aviso para a TV aqui..."></textarea><br>
    <button class="btn-enviar" onclick="enviar()">ATUALIZAR LETREIRO TV 🚀</button><br>
    <button class="btn-preset" onclick="preset('📢 ATENÇÃO: TROCA DE PLANTÃO EM ANDAMENTO.')">Troca Plantão</button>
    <button class="btn-preset" onclick="preset('⚠️ EMERGÊNCIA: ATENDIMENTOS PODEM DEMORAR.')">Emergência</button>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBRe3t7YCWUkggxBjE6d4OS4on4MrJ5J1A", authDomain: "sistema-crs-aero-rancho.firebaseapp.com", databaseURL: "https://sistema-crs-aero-rancho-default-rtdb.firebaseio.com", projectId: "sistema-crs-aero-rancho", storageBucket: "sistema-crs-aero-rancho.firebasestorage.app", messagingSenderId: "543461454068", appId: "1:543461454068:web:c06dbdab52c065e6962ea1" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();
        function enviar() { db.ref('avisos').set(document.getElementById('texto-aviso').value); }
        function preset(t) { document.getElementById('texto-aviso').value = t; enviar(); }
    </script>
</body>
</html>
