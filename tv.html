<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TV - CRS Aero Rancho</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { 
            background: #013154; color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }
        header { 
            background: white; color: #013154; padding: 10px 30px; 
            display: flex; justify-content: space-between; align-items: center; border-bottom: 6px solid #f1c40f; 
        }
        .unidade-info { text-align: left; }
        .dr-homenagem { font-size: 14px; font-weight: bold; color: #555; }
        #relogio { font-size: 2rem; font-weight: bold; }

        .layout-principal { display: flex; flex: 1; overflow: hidden; }

        #chamada-foco { 
            flex: 3; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; padding: 20px; border-right: 2px solid rgba(255,255,255,0.1);
            transition: all 0.5s;
        }
        .label-atencao { font-size: 2.5rem; color: #f1c40f; font-weight: bold; letter-spacing: 5px; margin-bottom: 10px; }
        .paciente-nome { 
            font-size: 7vw; font-weight: 900; text-transform: uppercase; 
            line-height: 1.1; text-shadow: 4px 4px 10px rgba(0,0,0,0.5); margin: 20px 0; 
        }
        .local-destino { 
            font-size: 3.5vw; background: rgba(255,255,255,0.1); padding: 15px 50px; 
            border-radius: 50px; border: 2px solid #f1c40f; 
        }

        /* Estilo para os Recados no Centro */
        .recado-titulo { font-size: 2.5rem; color: #f1c40f; margin-bottom: 20px; text-transform: uppercase; }
        .recado-texto { font-size: 4vw; font-weight: bold; max-width: 90%; line-height: 1.2; }

        #historico-lateral { flex: 1; background: rgba(0,0,0,0.2); padding: 20px; display: flex; flex-direction: column; }
        .hist-titulo { font-size: 1.5rem; color: #f1c40f; border-bottom: 2px solid #f1c40f; padding-bottom: 10px; margin-bottom: 15px; }
        .hist-item { 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; 
            margin-bottom: 10px; border-left: 5px solid #f1c40f; animation: slideIn 0.5s ease;
        }
        .hist-nome { font-size: 1.4rem; font-weight: bold; display: block; text-transform: uppercase; }
        .hist-local { font-size: 1.1rem; opacity: 0.8; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        footer { background: #e74c3c; height: 60px; display: flex; align-items: center; overflow: hidden; }
        .marquee { white-space: nowrap; font-size: 1.8rem; font-weight: bold; animation: scroll 25s linear infinite; width: 100%; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #013154; z-index: 1000; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .btn-play { background: #f1c40f; color: #013154; border: none; padding: 25px 50px; font-size: 2rem; font-weight: bold; border-radius: 15px; }
    </style>
</head>
<body>

<div id="overlay" onclick="iniciar()">
    <button class="btn-play">🔔 CLIQUE PARA ATIVAR O SISTEMA</button>
</div>

<header>
    <div class="unidade-info">
        <h1 style="margin:0; font-size: 1.8rem;">CRS 24h - AERO RANCHO</h1>
        <div class="dr-homenagem">Inaugurado por: Dr. João Pereira da Rosa</div>
    </div>
    <div id="relogio">00:00</div>
</header>

<div class="layout-principal">
    <main id="chamada-foco">
        <div id="conteudo-central">
            <div class="label-atencao">BEM-VINDO</div>
            <div class="paciente-nome">CRS AERO RANCHO</div>
        </div>
    </main>

    <aside id="historico-lateral">
        <div class="hist-titulo">ÚLTIMOS CHAMADOS</div>
        <div id="lista-hist"></div>
    </aside>
</div>

<footer>
    <div class="marquee" id="tv-avisos">Mantenha o respeito e o silêncio na unidade.</div>
</footer>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBRe3t7YCWUkggxBjE6d4OS4on4MrJ5J1A",
      authDomain: "sistema-crs-aero-rancho.firebaseapp.com",
      databaseURL: "https://sistema-crs-aero-rancho-default-rtdb.firebaseio.com",
      projectId: "sistema-crs-aero-rancho",
      storageBucket: "sistema-crs-aero-rancho.firebasestorage.app",
      messagingSenderId: "543461454068",
      appId: "1:543461454068:web:c06dbdab52c065e6962ea1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const bell = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
    let fila = [], ocupado = false, ativo = false, historico = [];
    let tempoLimpezaNome;
    let intervaloRecados;

    // Lista de recados para o carrossel central
    const recadosSaude = [
        { titulo: "Atendimento", texto: "O atendimento obedece à Classificação de Risco." },
        { titulo: "Documentação", texto: "Tenha em mãos seu Cartão do SUS e documento com foto." },
        { titulo: "Prevenção", texto: "Lave as mãos com frequência. A higiene previne doenças." },
        { titulo: "Hidratação", texto: "Beba água regularmente durante sua espera." },
        { titulo: "Dengue", texto: "Não deixe água parada. Combata o mosquito em sua casa." }
    ];
    let indiceRecado = 0;

    function iniciar() { 
        ativo = true; 
        document.getElementById('overlay').style.display = 'none'; 
        bell.play().catch(e => {}); 
        iniciarCarrosselRecados();
    }

    function iniciarCarrosselRecados() {
        if (intervaloRecados) clearInterval(intervaloRecados);
        intervaloRecados = setInterval(() => {
            if (!ocupado) {
                const recado = recadosSaude[indiceRecado];
                document.getElementById('chamada-foco').innerHTML = `
                    <div class="recado-titulo">${recado.titulo}</div>
                    <div class="recado-texto">${recado.texto}</div>
                `;
                indiceRecado = (indiceRecado + 1) % recadosSaude.length;
            }
        }, 8000); // Troca de recado a cada 8 segundos
    }

    setInterval(() => { 
        document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}); 
    }, 1000);

    db.ref('chamada_atual').on('value', snap => {
        const d = snap.val();
        if (d && d.timestamp > Date.now() - 10000) {
            fila.push(d);
            if (!ocupado && ativo) processar();
        }
    });

    db.ref('avisos').on('value', snap => { 
        if(snap.val()) document.getElementById('tv-avisos').innerText = snap.val(); 
    });

    function processar() {
        if (fila.length === 0 || !ativo) { 
            ocupado = false; 
            return; 
        }
        ocupado = true;
        const item = fila.shift();

        // Para o carrossel e mostra o nome instantaneamente
        clearTimeout(tempoLimpezaNome);
        
        document.getElementById('chamada-foco').innerHTML = `
            <div class="label-atencao">ATENÇÃO</div>
            <div class="paciente-nome">${item.nome}</div>
            <div class="local-destino">${item.local}</div>
        `;

        atualizarHistorico(item.nome, item.local);

        bell.play();
        setTimeout(() => {
            const prep = ["triagem", "sala", "coleta", "medicação", "inalação", "odontologia", "social"].some(x => item.local.toLowerCase().includes(x)) ? "à" : "ao";
            const fala = new SpeechSynthesisUtterance(`Atenção... Paciente... ${item.nome}... dirija-se ${prep} ${item.local}`);
            fala.lang = 'pt-BR'; 
            fala.rate = 0.8;
            window.speechSynthesis.speak(fala);
            
            fala.onend = () => { 
                // Após a fala, espera 5 segundos antes de voltar para os recados
                tempoLimpezaNome = setTimeout(() => {
                    ocupado = false;
                }, 5000);
                
                // Se houver mais gente na fila, chama o próximo
                if (fila.length > 0) {
                    clearTimeout(tempoLimpezaNome);
                    setTimeout(processar, 2000);
                }
            };
        }, 1300);
    }

    function atualizarHistorico(nome, local) {
        historico.unshift({nome, local});
        if(historico.length > 4) historico.pop();
        const lista = document.getElementById('lista-hist');
        lista.innerHTML = historico.map(h => `
            <div class="hist-item">
                <span class="hist-nome">${h.nome}</span>
                <span class="hist-local">${h.local}</span>
            </div>
        `).join('');
    }
</script>
</body>
</html>
