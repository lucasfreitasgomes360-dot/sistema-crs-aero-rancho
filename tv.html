<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TV Recepção - Rede CRS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #020617; --accent: #facc15; --text: #f8fafc; --card-bg: #0f172a; }
        body { margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--primary); color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #bloqueio-som { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); z-index: 9999; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .btn-ativar { padding: 30px 60px; background: var(--accent); color: var(--primary); border: none; border-radius: 30px; font-size: 2rem; font-weight: 800; cursor: pointer; }
        header { background: rgba(15, 23, 42, 0.95); padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--accent); }
        .logo-area h1 { margin: 0; font-size: 1.8rem; font-weight: 800; }
        .relogio { font-size: 2.2rem; font-weight: 700; color: var(--accent); }
        .main-content { flex: 1; display: flex; overflow: hidden; }
        .chamada-foco { flex: 3; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); transition: all 0.5s ease; }
        #senha-atual { font-size: 11rem; font-weight: 800; color: #fff; line-height: 1; text-align: center; }
        #local-atual { font-size: 5rem; color: var(--accent); font-weight: 700; text-transform: uppercase; margin-top: 20px; }
        .modo-espera #senha-atual { font-size: 5rem; color: rgba(255,255,255,0.1); }
        .modo-espera #local-atual { opacity: 0.2; transform: scale(0.8); }
        .historico { flex: 1; background: rgba(0,0,0,0.3); padding: 30px; display: flex; flex-direction: column; gap: 15px; }
        .hist-item { background: var(--card-bg); padding: 15px; border-radius: 18px; border-left: 6px solid var(--accent); }
        footer { background: #e11d48; height: 60px; display: flex; align-items: center; position: relative; overflow: hidden; }
        .marquee-text { display: inline-block; font-size: 1.8rem; font-weight: 800; color: white; white-space: nowrap; padding-left: 100%; animation: marquee 25s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        #card-aviso { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(600px); width: 80%; background: white; border-radius: 35px; box-shadow: 0 40px 80px rgba(0,0,0,0.7); transition: 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; padding: 40px; font-size: 2.8rem; font-weight: 800; color: #0f172a; text-align: center; }
        #card-aviso.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div id="bloqueio-som" onclick="iniciarTV()"><button class="btn-ativar">INICIAR PAINEL</button></div>
    <header>
        <div class="logo-area"><h1 id="unidade-nome">Carregando...</h1><p style="color:#94a3b8;margin:0">Rede Municipal de Saúde</p></div>
        <div class="relogio" id="relogio">00:00</div>
    </header>
    <div class="main-content">
        <div class="chamada-foco" id="area-foco">
            <div style="font-size:2rem;color:#64748b;font-weight:800;" id="txt-status">AGUARDE</div>
            <div id="senha-atual">---</div>
            <div id="local-atual">SINCRO...</div>
        </div>
        <div class="historico"><div id="lista-historico"></div></div>
    </div>
    <div id="card-aviso"></div>
    <footer>
        <div class="marquee-text" id="marquee-txt">Bem-vindo ao Sistema de Atendimento</div>
        <div style="position:absolute;right:10px;bottom:2px;font-size:0.6rem;color:rgba(255,255,255,0.5);">DESIGNED BY LUCAS FREITAS GOMES</div>
    </footer>

<script>
    const uID = sessionStorage.getItem('u_id');
    const uNome = sessionStorage.getItem('u_nome');
    document.getElementById('unidade-nome').innerText = uNome || "Unidade CRS";

    const firebaseConfig = { apiKey: "AIzaSyBRe3t7YCWUkggxBjE6d4OS4on4MrJ5J1A", databaseURL: "https://sistema-crs-aero-rancho-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let fila = [], processando = false, historico = [], timeoutEspera;
    const horaLigouTV = Date.now();

    function tocarSino() {
        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2861/2861-preview.mp3');
        audio.volume = 0.5;
        audio.play().catch(e => console.log("Erro áudio:", e));
    }

    function iniciarTV() {
        document.getElementById('bloqueio-som').style.display = 'none';
        
        // Ouvir Chamadas de Pacientes
        db.ref(uID + '/chamada').on('value', snap => {
            const d = snap.val();
            if (d && d.time > horaLigouTV && (!fila.length || fila[fila.length-1].time !== d.time)) {
                fila.push(d);
                if(!processando) processarFila();
            }
        });

        // Ouvir Letreiro da Gerência
        db.ref(uID + '/avisos').on('value', snap => {
            const dados = snap.val();
            if(dados) document.getElementById('marquee-txt').innerText = typeof dados === 'object' ? dados.texto : dados;
        });

        // Ouvir Avisos de Destaque
        db.ref(uID + '/aviso_destaque').on('value', snap => {
            const av = snap.val();
            if(av && av.time > horaLigouTV) {
                const card = document.getElementById('card-aviso');
                card.innerText = av.texto;
                card.style.borderLeft = `20px solid ${av.cor}`;
                card.classList.add('show');
                setTimeout(() => card.classList.remove('show'), 12000);
            }
        });
    }

    async function processarFila() {
        if (fila.length === 0) return;
        processando = true;
        clearTimeout(timeoutEspera);
        const c = fila.shift();
        
        tocarSino();
        await new Promise(res => {
            setTimeout(() => {
                document.getElementById('area-foco').classList.remove('modo-espera');
                document.getElementById('txt-status').innerText = "PACIENTE";
                document.getElementById('senha-atual').innerText = c.senha;
                document.getElementById('local-atual').innerText = c.consultorio;

                let prep = "ao";
                const local = c.consultorio.toLowerCase();
                if (["triagem","sala","emergência","recepção","medicação","sutura"].some(f => local.includes(f))) prep = "à";

                const fala = new SpeechSynthesisUtterance(`Atenção. Paciente ${c.senha}. Comparecer ${prep} ${c.consultorio}`);
                fala.lang = 'pt-BR';
                fala.onend = () => {
                    atualizarHistorico(c);
                    timeoutEspera = setTimeout(() => {
                        document.getElementById('area-foco').classList.add('modo-espera');
                        document.getElementById('txt-status').innerText = "AGUARDE";
                        document.getElementById('senha-atual').innerText = "---";
                    }, 4000);
                    res();
                };
                window.speechSynthesis.speak(fala);
            }, 1000);
        });
        processando = false;
        if (fila.length > 0) processarFila();
    }

    function atualizarHistorico(c) {
        historico.unshift(c);
        if(historico.length > 5) historico.pop();
        document.getElementById('lista-historico').innerHTML = historico.map(h => `
            <div class="hist-item"><b style="font-size:1.8rem;display:block">${h.senha}</b><small style="color:#94a3b8;font-weight:700">${h.consultorio}</small></div>
        `).join('');
    }

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}); }, 1000);
</script>
</body>
</html>
