<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TV - CRS Aero Rancho</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #013154; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: white; color: #013154; padding: 10px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid #f1c40f; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 10;}
        .layout { display: flex; flex: 1; overflow: hidden; }
        
        #foco { flex: 2.5; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border-right: 2px solid rgba(255,255,255,0.1); padding: 20px; box-sizing: border-box; }
        .chamada-ativa { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }

        .badge { font-size: 2.2rem; padding: 10px 50px; border-radius: 12px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .paciente { font-size: clamp(3rem, 6.5vw, 7.5rem); font-weight: 900; text-transform: uppercase; margin: 15px 0; text-shadow: 4px 4px 10px rgba(0,0,0,0.5); letter-spacing: 2px; max-width: 95%; word-wrap: break-word; line-height: 1.1; }
        .local { font-size: 4.5vw; background: rgba(255,255,255,0.1); padding: 15px 60px; border-radius: 60px; border: 3px solid #f1c40f; font-weight: bold; box-shadow: inset 0 0 20px rgba(0,0,0,0.2); margin-top: 10px; }
        
        /* HISTÓRICO POR SETOR */
        #historico-setores { flex: 1; background: rgba(0,0,0,0.3); padding: 15px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .setor-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; border-left: 5px solid #ccc; }
        .setor-card h4 { margin: 0 0 5px 0; font-size: 0.9rem; color: #f1c40f; text-transform: uppercase; }
        .setor-card p { margin: 0; font-weight: bold; font-size: 1.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .setor-card small { color: #aaa; font-size: 0.8rem; }

        footer { background: #e74c3c; height: 65px; display: flex; align-items: center; overflow: hidden; z-index: 10; }
        .marquee { white-space: nowrap; font-size: 2.2rem; font-weight: bold; animation: scroll 25s linear infinite; width: 100%; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #013154; z-index: 1000; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>
<div id="overlay" onclick="iniciar()"><button style="padding:25px; font-size:2rem; cursor:pointer; font-weight:bold; border-radius:15px; border:none; background:#f1c40f; color:#013154;">🔔 ATIVAR SISTEMA TV</button></div>
<header>
    <div><h1 style="margin:0;">CRS AERO RANCHO</h1><small>Dr. João Pereira da Rosa</small></div>
    <div id="relogio" style="font-size:3rem; font-weight:bold; color:#0056b3;">00:00</div>
</header>
<div class="layout">
    <main id="foco"></main>
    <aside id="historico-setores">
        <div class="setor-card" style="border-color: #007bff"><h4>MÉDICO</h4><p id="hist-medico">---</p><small id="local-medico">-</small></div>
        <div class="setor-card" style="border-color: #28a745"><h4>ENFERMAGEM</h4><p id="hist-enfermagem">---</p><small id="local-enfermagem">-</small></div>
        <div class="setor-card" style="border-color: #d35400"><h4>ODONTOLOGIA</h4><p id="hist-odonto">---</p><small id="local-odonto">-</small></div>
        <div class="setor-card" style="border-color: #8e44ad"><h4>SERVIÇO SOCIAL</h4><p id="hist-social">---</p><small id="local-social">-</small></div>
    </aside>
</div>
<footer><div class="marquee" id="tv-avisos">Aguardando avisos da gerência...</div></footer>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBRe3t7YCWUkggxBjE6d4OS4on4MrJ5J1A", authDomain: "sistema-crs-aero-rancho.firebaseapp.com", databaseURL: "https://sistema-crs-aero-rancho-default-rtdb.firebaseio.com", projectId: "sistema-crs-aero-rancho", storageBucket: "sistema-crs-aero-rancho.firebasestorage.app", messagingSenderId: "543461454068", appId: "1:543461454068:web:c06dbdab52c065e6962ea1" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const bell = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
    
    let ocupado = false, ativo = false, iRec = 0;
    let ultimaChamadaId = 0;
    let filaChamadas = [];

    const recados = [
        {t:"DENGUE", x:"Elimine criadouros de mosquitos. Use repelente."},
        {t:"ATENÇÃO", x:"Acompanhe o painel para a sua chamada."},
        {t:"SAÚDE", x:"Lave as mãos com frequência."}
    ];

    function iniciar() { 
        ativo = true; 
        document.getElementById('overlay').style.display='none'; 
        carrossel(); 
        setInterval(carrossel, 10000); 
    }
    
    function carrossel() { 
        if(!ocupado && ativo && filaChamadas.length === 0) { 
            const r = recados[iRec]; 
            const foco = document.getElementById('foco');
            foco.innerHTML = `<h2 style="color:#f1c40f; font-size:3.5rem;">${r.t}</h2><p style="font-size:4.5vw; font-weight:bold;">${r.x}</p>`; 
            foco.className = ''; 
            iRec = (iRec + 1) % recados.length; 
        } 
    }
    
    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}); }, 1000);
    db.ref('avisos').on('value', snap => { if(snap.val()) document.getElementById('tv-avisos').innerText = snap.val(); });

    db.ref('chamada_atual').on('value', snap => { 
        const d = snap.val(); 
        if(d && d.timestamp !== ultimaChamadaId) {
            ultimaChamadaId = d.timestamp;
            filaChamadas.push(d);
            if(!ocupado) processarFila();
        } 
    });

    async function processarFila() {
        if (filaChamadas.length === 0 || !ativo) {
            ocupado = false;
            return;
        }

        ocupado = true;
        const item = filaChamadas.shift();
        
        let local = item.local.toLowerCase();
        let cor = "#007bff", setorNome = "MÉDICOS", idAlvo = "medico";
        
        if(local.includes("triagem") || local.includes("medicação") || local.includes("coleta") || local.includes("reidratação")) { 
            cor = "#28a745"; setorNome = "ENFERMAGEM"; idAlvo = "enfermagem";
        } else if(local.includes("odontologia")) { 
            cor = "#d35400"; setorNome = "ODONTOLOGIA"; idAlvo = "odonto";
        } else if(local.includes("social")) { 
            cor = "#8e44ad"; setorNome = "SERVIÇO SOCIAL"; idAlvo = "social";
        }

        // Atualiza Histórico Particular do Setor
        document.getElementById('hist-' + idAlvo).innerText = item.nome;
        document.getElementById('local-' + idAlvo).innerText = item.local;

        // Visual na Tela Principal
        const foco = document.getElementById('foco');
        foco.className = 'chamada-ativa';
        foco.innerHTML = `<div class="badge" style="background:${cor}">${setorNome}</div><div class="paciente">${item.nome}</div><div class="local">${item.local}</div>`;
        
        bell.play();
        
        // Voz
        await new Promise(resolve => {
            setTimeout(() => {
                const fala = new SpeechSynthesisUtterance(`Atenção, paciente ${item.nome}. Compareça à ${item.local}`);
                fala.lang = 'pt-BR'; 
                fala.rate = 0.9;
                fala.onend = resolve;
                window.speechSynthesis.speak(fala);
            }, 1500);
        });

        // Espera 6 segundos exibindo o nome antes de ir para o próximo ou voltar carrossel
        await new Promise(resolve => setTimeout(resolve, 6000));
        
        if(filaChamadas.length === 0) {
            ocupado = false;
            carrossel();
        } else {
            processarFila();
        }
    }
</script>
</body>
</html>
