<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TV - CRS Aero Rancho</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(rgba(1, 49, 84, 0.85), rgba(1, 49, 84, 0.85)), url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; color: white; margin: 0; overflow: hidden; 
        }
        header { background: rgba(255,255,255,0.9); color: #013154; padding: 15px; text-align: center; border-bottom: 8px solid #f1c40f; }
        #relogio { position: absolute; top: 25px; right: 30px; font-size: 28px; font-weight: bold; color: #013154; }
        #area-chamada { height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .paciente { font-size: 100px; font-weight: 900; text-transform: uppercase; text-shadow: 4px 4px 10px #000; margin: 20px 0; }
        .local { font-size: 60px; background: rgba(0,0,0,0.6); padding: 15px 50px; border-radius: 50px; border: 3px solid #f1c40f; }
        footer { position: fixed; bottom: 0; width: 100%; background: #e74c3c; height: 80px; display: flex; align-items: center; overflow: hidden; }
        .marquee { white-space: nowrap; font-size: 35px; font-weight: bold; animation: scroll 30s linear infinite; padding-left: 100%; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-200%); } }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #013154; z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .btn-play { background: #f1c40f; color: #013154; border: none; padding: 30px 60px; font-size: 30px; font-weight: bold; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body>
<div id="overlay"><button class="btn-play" onclick="iniciar()">🔔 CLIQUE PARA ATIVAR A TV</button></div>
<audio id="bell" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
<header>
    <h1>CRS 24h - Aero Rancho</h1>
    <div id="relogio">00:00</div>
</header>
<main id="area-chamada">
    <div style="font-size:30px; color:#f1c40f; font-weight:bold;">ATENÇÃO</div>
    <div class="paciente" id="tv-nome">AGUARDANDO...</div>
    <div class="local" id="tv-local">---</div>
</main>
<footer><div class="marquee" id="tv-avisos">Bem-vindo ao CRS Aero Rancho - Dr. João Pereira da Rosa</div></footer>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBRe3t7YCWUkggxBjE6d4OS4on4MrJ5J1A",
      authDomain: "sistema-crs-aero-rancho.firebaseapp.com",
      databaseURL: "https://sistema-crs-aero-rancho-default-rtdb.firebaseio.com",
      projectId: "sistema-crs-aero-rancho",
      storageBucket: "sistema-crs-aero-rancho.firebasestorage.app",
      messagingSenderId: "543461454068",
      appId: "1:543461454068:web:c06dbdab52c065e6962ea1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let fila = [], ocupado = false, ativo = false;

    function iniciar() { ativo = true; document.getElementById('overlay').style.display = 'none'; }
    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}); }, 1000);

    db.ref('chamada_atual').on('value', snap => {
        const d = snap.val();
        if (d && d.timestamp > Date.now() - 10000) {
            fila.push(d);
            if (!ocupado && ativo) processar();
        }
    });

    db.ref('avisos').on('value', snap => { if(snap.val()) document.getElementById('tv-avisos').innerText = snap.val(); });

    function processar() {
        if (fila.length === 0 || !ativo) { ocupado = false; return; }
        ocupado = true;
        const item = fila.shift();
        document.getElementById('tv-nome').innerText = item.nome;
        const prep = ["triagem", "sala", "coleta", "medicação", "inalação", "odontologia", "social"].some(x => item.local.toLowerCase().includes(x)) ? "à" : "ao";
        document.getElementById('tv-local').innerText = `Dirija-se ${prep} ${item.local}`;
        
        document.getElementById('bell').play();
        setTimeout(() => {
            const fala = new SpeechSynthesisUtterance(`Paciente... ${item.nome}... dirija-se ${prep} ${item.local}`);
            fala.lang = 'pt-BR'; fala.rate = 0.8;
            window.speechSynthesis.speak(fala);
            fala.onend = () => { setTimeout(processar, 4000); };
        }, 1200);
    }
</script>
</body>
</html>
