<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TV - CRS Aero Rancho</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        /* Visual baseado no modelo enviado */
        body { background: #002b5c; color: white; font-family: sans-serif; text-align: center; height: 100vh; margin: 0; display: flex; flex-direction: column; overflow: hidden; }
        .topo { background: #001a38; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid #ffcc00; }
        .unidade-nome { font-size: 1.8rem; font-weight: bold; text-align: left; }
        .relogio { font-size: 2.5rem; color: #ffcc00; }
        .conteudo-principal { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; position: relative; }
        
        /* Área de Chamada de Paciente */
        .paciente { font-size: 8rem; font-weight: bold; color: #ffcc00; text-transform: uppercase; padding: 0 20px; line-height: 1.1; text-shadow: 4px 4px 10px rgba(0,0,0,0.5); }
        .local { font-size: 5rem; background: white; color: #002b5c; padding: 10px 60px; border-radius: 20px; display: inline-block; margin-top: 25px; font-weight: bold; border: 4px solid #ffcc00; }
        
        /* Rodapé com Avisos */
        footer { background: #ffcc00; color: #002b5c; height: 60px; display: flex; align-items: center; overflow: hidden; position: fixed; bottom: 0; width: 100%; }
        .marquee { white-space: nowrap; font-size: 1.8rem; font-weight: bold; animation: scroll 30s linear infinite; padding-left: 100%; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-200%); } }
        
        /* Efeito de Piscar ao chamar */
        @keyframes flash { 0% { background-color: #002b5c; } 50% { background-color: #ffcc00; } 100% { background-color: #002b5c; } }
        .piscar-alerta { animation: flash 0.8s ease-in-out 5; }

        /* Botão Inicial de Ativação */
        #aviso-inicial { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        .btn-iniciar { background: #ffcc00; color: #002b5c; border: none; padding: 20px 40px; font-size: 2rem; font-weight: bold; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body id="corpo-tv">
    <div id="aviso-inicial" onclick="iniciarSistema()">
        <h1 style="color: #ffcc00;">SISTEMA PRONTO</h1>
        <button class="btn-iniciar">CLIQUE PARA ATIVAR SOM E TV</button>
    </div>

    <div class="topo">
        <div class="unidade-nome">CRS 24h - AERO RANCHO<br><span style="font-size: 1.1rem; opacity: 0.8;">Dr. João Pereira da Rosa</span></div>
        <div id="relogio" class="relogio">00:00:00</div>
    </div>

    <div class="conteudo-principal">
        <div id="area-chamada">
            <div style="font-size: 2rem; color: #fff; margin-bottom: 10px;">ATENÇÃO</div>
            <div id="tv-nome" class="paciente">AGUARDANDO...</div>
            <div id="tv-local" class="local">---</div>
        </div>
    </div>

    <footer>
        <div class="marquee" id="tv-avisos">Bem-vindo ao CRS Aero Rancho • Dr. João Pereira da Rosa</div>
    </footer>

    <script>
        [span_0](start_span)// MANTENDO SUAS CONFIGURAÇÕES DO CRS AERO RANCHO[span_0](end_span)
        const firebaseConfig = {
          apiKey: "AIzaSyBRe3t7YCWUkggxBjE6d4OS4on4MrJ5J1A",
          authDomain: "sistema-crs-aero-rancho.firebaseapp.com",
          databaseURL: "https://sistema-crs-aero-rancho-default-rtdb.firebaseio.com",
          projectId: "sistema-crs-aero-rancho",
          storageBucket: "sistema-crs-aero-rancho.firebasestorage.app",
          messagingSenderId: "543461454068",
          appId: "1:543461454068:web:c06dbdab52c065e6962ea1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const somCampainha = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        let fila = [], ocupado = false, ativo = false;

        function iniciarSistema() {
            ativo = true;
            document.getElementById('aviso-inicial').style.display = 'none';
            somCampainha.play().catch(() => {});
        }

        [span_1](start_span)// Relógio[span_1](end_span)
        setInterval(() => { 
            document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR'); 
        }, 1000);

        [span_2](start_span)// Escutar Chamadas[span_2](end_span)
        db.ref('chamada_atual').on('value', snap => {
            const d = snap.val();
            if (d && d.timestamp > Date.now() - 10000) {
                fila.push(d);
                if (!ocupado && ativo) processarFila();
            }
        });

        [span_3](start_span)// Escutar Avisos[span_3](end_span)
        db.ref('avisos').on('value', snap => { 
            if(snap.val()) document.getElementById('tv-avisos').innerText = snap.val(); 
        });

        function processarFila() {
            if (fila.length === 0 || !ativo) { ocupado = false; return; }
            ocupado = true;
            const item = fila.shift();

            // Atualiza Interface
            document.getElementById('tv-nome').innerText = item.nome;
            const prep = ["triagem", "sala", "coleta", "medicação", "inalação", "odontologia", "social"].some(x => item.local.toLowerCase().includes(x)) ? "à" : "ao";
            document.getElementById('tv-local').innerText = item.local;

            // Efeito visual de piscar
            document.body.classList.remove('piscar-alerta');
            void document.body.offsetWidth;
            document.body.classList.add('piscar-alerta');

            // Som e Voz
            somCampainha.play();
            
            setTimeout(() => {
                const fala = new SpeechSynthesisUtterance(`Atenção... Paciente... ${item.nome}... dirija-se ${prep} ${item.local}`);
                fala.lang = 'pt-BR';
                fala.rate = 0.85;
                window.speechSynthesis.speak(fala);
                fala.onend = () => { setTimeout(processarFila, 4000); };
            }, 1500);
        }
    </script>
</body>
</html>
