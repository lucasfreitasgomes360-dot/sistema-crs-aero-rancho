        .btn-login:hover { transform: translateY(-2px); background: #1e293b; }
        #msg-erro { color: var(--error); font-size: 0.85rem; font-weight: 700; margin-top: 15px; display: none; }
        .hidden { display: none !important; }
        .btn-unidade { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; background: #f1f5f9; border: 2px solid transparent; cursor: pointer; font-weight: 700; transition: 0.2s; text-align: center; }

    async function validar() {
        const u = document.getElementById('user').value.toLowerCase().trim();
        const p = document.getElementById('pass').value;
        const msgErro = document.getElementById('msg-erro');
        msgErro.style.display = "none";

        if (!u || !p) return;

        // 1. Tenta no Banco de Dados
        db.ref('profissionais/' + u).once('value').then(snap => {
            const userDB = snap.val();

            if (userDB) {
                conferirSenha(userDB, u, p, true);
            } else {
                // 2. Tenta na lista fixa
                const userFixo = PROFISSIONAIS[u];
                if (userFixo) {
                    conferirSenha(userFixo, u, p, false);
                } else {
                    msgErro.style.display = "block";
                }
            }
        });
    }

    function conferirSenha(user, login, senhaDigitada, isDB) {
        if (user.pass === senhaDigitada) {
            
            // Troca de senha obrigatória para novos no DB
            if (isDB && user.trocarSenha) {
                const nova = prompt("Segurança: Digite uma nova senha definitiva:");
                if (nova && nova.length >= 4) {
                    db.ref('profissionais/' + login).update({ pass: nova, trocarSenha: false });
                    alert("Senha alterada! Faça login novamente.");
                    location.reload();
                    return;
                } else {
                    alert("Senha inválida.");
                    return;
                }
            }

            logar(user);
        } else {
            document.getElementById('msg-erro').style.display = "block";
        }
    }

    function logar(user) {
        sessionStorage.clear();
        sessionStorage.setItem('logado', 'true');
        sessionStorage.setItem('p_nome', user.nome);
        sessionStorage.setItem('p_cargo', user.cargo);

        // Se for Gerente (Lucas)
        if (user.tipo === "gerencia") {
            const vaiTV = confirm("Deseja abrir a TV?\n\n[OK] Sim, abrir TV\n[Cancelar] Não, ir para Gestão");
            // Se ele for gerente, geralmente ele atua na unidade que ele escolher ou na padrão
            if (user.multi) {
                mostrarUnidades(user);
                sessionStorage.setItem('is_admin_tv', vaiTV ? "sim" : "nao");
            } else {
                sessionStorage.setItem('u_id', user.id);
                sessionStorage.setItem('u_nome', user.un);
                window.location.href = vaiTV ? "tv.html" : "gerencia.html";
            }
            return;
        }

        // Se for Profissional comum
        if (user.multi) {
            mostrarUnidades(user);
        } else {
            sessionStorage.setItem('u_id', user.id);
            sessionStorage.setItem('u_nome', user.un);
            window.location.href = "painel.html";
        }
    }

    function mostrarUnidades(user) {
        document.getElementById('card-login').classList.add('hidden');
        document.getElementById('card-unidades').classList.remove('hidden');
        document.getElementById('welcome').innerText = "Olá, " + user.nome.split(' ')[0];
        
        const grid = document.getElementById('grid-unidades');
        grid.innerHTML = user.unidades.map(un => 
            `<div class="btn-unidade" onclick="finalizarLogin('${un.id}','${un.n}','${user.tipo}')">${un.n}</div>`
        ).join('');
    }

    function finalizarLogin(id, nome, tipo) {
        sessionStorage.setItem('u_id', id);
        sessionStorage.setItem('u_nome', nome);
        
        if (tipo === "gerencia") {
            const querTV = sessionStorage.getItem('is_admin_tv');
            window.location.href = (querTV === "sim") ? "tv.html" : "gerencia.html";
        } else {
            window.location.href = "painel.html";
        }
    }
</script>
</body>
</html>
