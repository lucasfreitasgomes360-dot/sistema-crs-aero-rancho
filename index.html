<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portal - CRS Aero Rancho</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --dark: #013154; --amarelo: #f1c40f; --azul: #0056b3; --verde: #28a745; --roxo: #6f42c1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #e9ecef; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; }
        .container { background: white; width: 100%; max-width: 450px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .logo { width: 80px; height: 80px; background: var(--dark); color: var(--amarelo); border-radius: 50%; display: inline-flex; justify-content: center; align-items: center; font-size: 2.5rem; font-weight: bold; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        h1 { color: var(--dark); margin: 0 0 5px 0; font-size: 1.8rem; }
        p { color: #666; margin-bottom: 30px; font-size: 1rem; }
        .btn-link { display: block; width: 100%; padding: 20px; margin: 12px 0; border: none; border-radius: 15px; font-size: 1.2rem; font-weight: bold; color: white; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; box-sizing: border-box; }
        .btn-link:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .btn-tv { background: var(--dark); border-left: 8px solid var(--amarelo); }
        .btn-painel { background: var(--azul); border-left: 8px solid var(--amarelo); }
        .btn-gerencia { background: var(--verde); border-left: 8px solid var(--amarelo); }
        footer { margin-top: 20px; font-size: 0.85rem; color: #888; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">🏥</div>
    <h1>CRS Aero Rancho</h1>
    <p>Selecione o painel de acesso</p>
    <a href="tv.html" class="btn-link btn-tv">📺 TV DA RECEPÇÃO</a>
    <a href="painel.html" class="btn-link btn-painel">📢 PAINEL DE CHAMADA</a>
    <a href="gerencia.html" class="btn-link btn-gerencia">⚙️ PAINEL DA GERÊNCIA</a>
</div>
<footer>
    Desenvolvido por <b>Lucas Freitas Gomes</b> &copy; 2026<br>
    CRS Aero Rancho
</footer>
</body>
</html>
