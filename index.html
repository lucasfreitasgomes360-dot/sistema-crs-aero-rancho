<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TV - CRS Aero Rancho</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #013154; color: white; margin: 0; overflow: hidden; }
        header { background: #fff; color: #013154; padding: 15px; text-align: center; border-bottom: 8px solid #f1c40f; position: relative; }
        .dr-homenagem { font-size: 14px; font-weight: bold; color: #555; margin-top: 5px; }
        #relogio { position: absolute; top: 25px; right: 30px; font-size: 28px; font-weight: bold; }
        #area-chamada { height: 75vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .status { font-size: 30px; color: #f1c40f; letter-spacing: 5px; margin-bottom: 20px; }
        .paciente { font-size: 100px; font-weight: 900; text-align: center; text-transform: uppercase; text-shadow: 4px 4px 10px rgba(0,0,0,0.5); }
        .local { font-size: 60px; background: rgba(255,255,255,0.1); padding: 10px 40px; border-radius: 50px; margin-top: 30px; }
        footer { position: fixed; bottom: 0; width: 100%; background: #e74c3c; height: 70px; overflow: hidden; display: flex; align-items: center; }
        .marquee { white-space: nowrap; font-size: 35px; font-weight: bold; animation: scroll 25s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>
<header>
    <h1 style="margin:0">Centro Regional de Saúde 24h - Aero Rancho</h1>
    <div class="dr-homenagem">Dr. João Pereira da Rosa</div>
    <div id="relogio">00:00</div>
</header>
<main id="area-chamada">
    <div class="status" id="label-status">AGUARDANDO...</div>
    <div class="paciente" id="tv-nome">---</div>
    <div class="local" id="tv-local">---</div>
</main>
<footer><div class="marquee" id="tv-avisos">Carregando avisos do CRS Aero Rancho...</div></footer>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBRe3t7YCWUkggxBjE6d4OS4on4MrJ5J1A",
      authDomain: "sistema-crs-aero-rancho.firebaseapp.com",
      databaseURL: "https://sistema-crs-aero-rancho-default-rtdb.firebaseio.com",
      projectId: "sistema-crs-aero-rancho",
      storageBucket: "sistema-crs-aero-rancho.firebasestorage.app",
      messagingSenderId: "543461454068",
      appId: "1:543461454068:web:c06dbdab52c065e6962ea1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let fila = [];
    let ocupado = false;

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}); }, 1000);

    db.ref('chamada_atual').on('value', snapshot => {
        const dados = snapshot.val();
        if (dados && dados.timestamp > Date.now() - 5000) {
            fila.push(dados);
            if (!ocupado) processarFila();
        }
    });

    db.ref('avisos').on('value', snap => { document.getElementById('tv-avisos').innerText = snap.val() || "Bem-vindo ao CRS Aero Rancho"; });

    function processarFila() {
        if (fila.length === 0) { ocupado = false; document.getElementById('label-status').innerText = "AGUARDANDO..."; return; }
        ocupado = true;
        const item = fila.shift();
        document.getElementById('label-status').innerText = "ATENÇÃO";
        document.getElementById('tv-nome').innerText = item.nome;
        const preposicao = ["triagem", "sala", "coleta", "medicação", "inalação", "odontologia", "social"].some(x => item.local.toLowerCase().includes(x)) ? "à" : "ao";
        document.getElementById('tv-local').innerText = `Dirija-se ${preposicao} ${item.local}`;
        
        const msg = new SpeechSynthesisUtterance(`Atenção... ${item.genero === 'F' ? 'A paciente' : 'O paciente'} ${item.nome}... dirija-se ${preposicao} ${item.local}`);
        msg.lang = 'pt-BR';
        msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
        msg.onend = () => { setTimeout(processarFila, 4000); };
    }
</script>
</body>
</html>
